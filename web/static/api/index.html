<!DOCTYPE html>
<!--
  Hand-owned index.html for bountiful's API docs viewer.

  Loads the fe-doc-viewer web component and points it at the docs.json
  bundle generated by `fe doc`. Branding, theming, and the api-theme.css
  link are owned here so we never have to mutate generated output via sed.

  The other files in this directory (docs.json, fe-web.js, styles.css,
  fe-highlight.css) are produced by `fe doc json` and `fe doc bundle` and
  may be either committed (pinned) or regenerated in CI; this index.html
  is always preserved by both paths.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bountiful — API Reference</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="fe-highlight.css">
  <link rel="stylesheet" href="../css/api-theme.css">
</head>
<body>
  <script src="fe-web.js"></script>
  <fe-doc-viewer title="Bountiful Documentation" src="docs.json" routing="hash"></fe-doc-viewer>
</body>
</html>
